name: CI

on:
  push:
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Install package
        run: python -m pip install .

      - name: Verify Python files compile
        run: python -m py_compile .hatch_build.py tutorpok/plugin.py tutorpok/__about__.py

      - name: Verify plugin imports
        run: python -c "import importlib; importlib.import_module('tutorpok.plugin')"

      - name: Build distributions
        run: python -m build

      - name: Check distributions with twine
        run: python -m twine check dist/*
